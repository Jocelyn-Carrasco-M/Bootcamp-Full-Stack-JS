<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejercicio Calculo de Bono</title>
        
        <style>
            body {
                margin-top: 0;
            }
        </style>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <header>
            <div class="bg-primary text-white py-4 shadow-sm">
                <div class="container">
                    <h1 class="h3 mb-0 fw-semibold">Calculadora de Bonos por Carga Familiar</h1>
                </div>
            </div>
        </header>
        <main>
            <div class="row g-0">
                <aside class="col-md-3 col-lg-2">
                    <nav class="bg-light border-end min-vh-100 p-3">
                        <h6 class="text-uppercase text-secondary mb-3">Menú</h6>
                        <ul class="nav flex-column">
                            <li class="nav-item">
                                <a href="index.html" class="nav-link active">
                                    Operaciones
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="./Acercade.html" class="nav-link">
                                    Acerca de
                                </a>
                            </li>
                        </ul>
                    </nav>
                </aside>
                <section class="col-md-9 col-lg-10">
                    <div class="container py-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-body p-4">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">
                                        Monto correspondiente a sueldo:
                                    </label>
                                    <input type="number"
                                        placeholder="Ingrese el monto"
                                        id="numero1"
                                        class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">
                                        Número de Cargas Familiares:
                                    </label>
                                    <input type="number"
                                        placeholder="Ingrese el número de cargas"
                                        id="numero2"
                                        class="form-control">
                                </div>
                                    </label>
                                     <div class="text-end">
                                    <button class="btn btn-primary px-4"
                                            id="calcular"
                                            onclick="operacion();">
                                        Calcular
                                    </button>
                                </div>
                                <div class="alert alert-light border mb-3">
                                    <strong>Bono a recibir:</strong>
                                    <span id="resultado"></span>
                                </div>
                               
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
        <footer>
            <div class="bg-dark text-light py-3 mt-4">
                <div class="container text-center">
                    <p class="mb-0">Desarrollado por Jocelyn Carrasco</p>
                </div>
            </div>
        </footer>
        <script>
               function operacion() {
                const sueldo = Number(document.getElementById("numero1").value);
                const cargas = Number(document.getElementById("numero2").value);
                let bono = sueldo * (0.02 * cargas);
                document.getElementById("resultado").textContent = "$" + bono;
                }
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>

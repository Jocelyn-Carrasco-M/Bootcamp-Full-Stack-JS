<!DOCTYPE html>
    <html lang="es">

        <head>
            <meta charset="UTF-8">
            <title>Conversión Kelvin a Celsius</title>
        </head>

        <body>

            <h1>Conversión de Temperaturas</h1>
            <h2>Kelvin a Celsius</h2>

            <label>Ingrese grados Kelvin:</label>
            <input type="number" id="temperatura">

            <button onclick="convertir();">
                Convertir
            </button>

            <p>
                Resultado:
                <span id="resultado"></span>
    </p>

    <script>

        function convertir() {

            let kelvin = Number(
                document.getElementById("temperatura").value
            );

            let celsius = kelvin - 273.15;

            document.getElementById("resultado").textContent =
                celsius.toFixed(2) + " °C";
        }

    </script>

</body>

</html>

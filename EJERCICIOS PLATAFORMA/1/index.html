<!DOCTYPE html>
<!--indica que se trabajará con HTML5-->
<html lang="es">
    <head> 
    <!-- información para el navegador, el usuario no lo ve-->
    
    <meta charset="UTF-8">
    <title>Mi web en HTML</title> 
    <!--Nombre que aparece en la pestaña del navegador-->

    </head>
    <body>
    <!--Incluye todo el contenido que se verá en la página-->

        <header>Bienvenido</header>
        <!--corresponde al encabezado de la página-->

            <h1>Mi sitio Web</h1>
            <!--corresponde al Título principal de la página-->

                <p>Te contaré un poco de mi</p>
                <!--indica un parrafo de texto-->

        <section>
        <!--es una sección de contenido-->    

            <article>
            <!--define una sección de contenido independiente--> 
                <p>Mi nombre es Jocelyn Carrasco, actualmente vivo en la ciudad e Angol, IX región</p>
            </article>

            <aside>
            <!--indica una sección de contenido con poca relación al contenido principal-->   
                <p>Información adicional</p>
            </aside>

        </section>

    <footer>sitio creado por JCVM</footer>
    <!--indica el pie de página-->
    </body>
</html>

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title> Calculadora de Iva</title>
        <script src="./js/jquery-4.0.0.min.js"></script>
    </head>
    <body>
        <h1>Calculadora de Monto de retención de boletas</h1>
        <input type="number" id="numero" placeholder="Ingrese el monto">
        <button id="btnCalcula">Calcula</button>
        <span id= "resultado"></span>

        <script>
            $("#btnCalcula").click(
                function () {
                    //Recupero los datos desde los input
                    let number= $("#numero").val();
                    let retención = number * 0.1525;
                
                    //Muestro el resultado en el párrafo
                    $("#resultado").text("El monto de retención es: $" + retención);

                }
            );
        </script>

    </body>
</html>
